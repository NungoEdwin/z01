<div class="container">
  <h1>Products</h1>
  
  <div class="search-filter">
    <input type="text" [(ngModel)]="searchKeyword" placeholder="Search products..." (keyup.enter)="searchProducts()">
    <button (click)="searchProducts()">Search</button>
    
    <select [(ngModel)]="selectedCategory" (change)="filterProducts()">
      <option value="">All Categories</option>
      <option value="Electronics">Electronics</option>
      <option value="Clothing">Clothing</option>
      <option value="Books">Books</option>
    </select>
    
    <input type="number" [(ngModel)]="minPrice" placeholder="Min Price" (change)="filterProducts()">
    <input type="number" [(ngModel)]="maxPrice" placeholder="Max Price" (change)="filterProducts()">
  </div>

  <div class="product-grid">
    <div class="product-card" *ngFor="let product of filteredProducts">
      <img [src]="product.imageUrl || 'assets/placeholder.png'" [alt]="product.name">
      <h3>{{ product.name }}</h3>
      <p>{{ product.description }}</p>
      <p class="price">${{ product.price }}</p>
      <p class="stock">Stock: {{ product.stockQuantity }}</p>
      <button (click)="addToCart(product.id)" [disabled]="product.stockQuantity === 0">Add to Cart</button>
    </div>
  </div>
</div>
